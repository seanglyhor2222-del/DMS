{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-user-edit me-2"></i>Edit User: {{ edit_user.username }}</h5>
                <a href="{% url 'user_list' %}" class="btn btn-sm btn-secondary">Back to List</a>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" value="{{ edit_user.username }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ edit_user.full_name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ edit_user.email }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ edit_user.phone }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ edit_user.department }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        {% for role in roles %}
                        <option value="{{ role.role_id }}" {% if edit_user.role.role_id == role.role_id %}selected{% endif %}>
                            {{ role.role_name|title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password (leave blank to keep current)</label>
                    <input type="password" name="password" class="form-control">
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if edit_user.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">Active Account</label>
                    </div>
                </div>
                <div class="text-end">
                    <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
