{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-edit me-2"></i>Edit Document: {{ document.title }}</h5>
            </div>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Document Title</label>
                    <input type="text" name="title" class="form-control" value="{{ document.title }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4">{{ document.description }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">New File (Optional)</label>
                    <input type="file" name="file" class="form-control">
                    <small class="text-muted">Current file: {{ document.file.name|slice:"12:" }}</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Change Notes</label>
                    <textarea name="changes" class="form-control" rows="3" placeholder="What changed in this version?"></textarea>
                </div>
                <div class="text-end">
                    <a href="{% url 'document_detail' document.id %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
