{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">
        {{ category.name }}
    </h2>

    <div class="card">

        <div class="card-header">
            Documents in {{ category.name }}
        </div>

        <table class="table">

            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Owner</th>
                </tr>
            </thead>

            <tbody>

            {% for doc in documents %}

                <tr>
                    <td>{{ doc.title }}</td>
                    <td>{{ doc.status }}</td>
                    <td>{{ doc.owner.username }}</td>
                </tr>

            {% empty %}

                <tr>
                    <td colspan="3">
                        No documents found
                    </td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
